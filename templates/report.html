<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{YEAR}}년 {{MONTH}}월 경비 보고서</title>
    <style>
        @page {
            size: A4;
            margin: 20mm 15mm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            font-size: 10pt;
            line-height: 1.6;
            color: #333;
            background: #fff;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #2c3e50;
        }

        .header h1 {
            font-size: 24pt;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 11pt;
            color: #7f8c8d;
        }

        /* Summary Section */
        .summary {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .summary-item {
            text-align: center;
        }

        .summary-item .label {
            font-size: 9pt;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .summary-item .value {
            font-size: 16pt;
            font-weight: bold;
            color: #2c3e50;
        }

        .summary-item .value.amount {
            color: #e74c3c;
        }

        /* Section Headers */
        .section-header {
            font-size: 13pt;
            font-weight: bold;
            color: #2c3e50;
            margin: 25px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #3498db;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            font-size: 9pt;
        }

        table th {
            background: #34495e;
            color: #fff;
            font-weight: bold;
            padding: 10px 8px;
            text-align: center;
            border: 1px solid #2c3e50;
        }

        table td {
            padding: 8px;
            border: 1px solid #dee2e6;
            text-align: center;
        }

        table tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        table tbody tr:hover {
            background: #e9ecef;
        }

        table td.left {
            text-align: left;
        }

        table td.right {
            text-align: right;
        }

        table td.amount {
            font-weight: bold;
            color: #e74c3c;
        }

        /* Expense Table Specific */
        .expense-table th:nth-child(1) { width: 5%; }  /* No. */
        .expense-table th:nth-child(2) { width: 10%; } /* 날짜 */
        .expense-table th:nth-child(3) { width: 20%; } /* 가맹점 */
        .expense-table th:nth-child(4) { width: 12%; } /* 금액 */
        .expense-table th:nth-child(5) { width: 15%; } /* 사업자등록번호 */
        .expense-table th:nth-child(6) { width: 10%; } /* 분류 */
        .expense-table th:nth-child(7) { width: 28%; } /* 비고 */

        /* Category Table Specific */
        .category-table th:nth-child(1) { width: 40%; } /* 분류 */
        .category-table th:nth-child(2) { width: 20%; } /* 건수 */
        .category-table th:nth-child(3) { width: 25%; } /* 금액 */
        .category-table th:nth-child(4) { width: 15%; } /* 비율 */

        /* Category Badge */
        .category-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 8pt;
            font-weight: bold;
            background: #3498db;
            color: #fff;
        }

        .category-badge.식비 { background: #e74c3c; }
        .category-badge.교통비 { background: #3498db; }
        .category-badge.통신비 { background: #9b59b6; }
        .category-badge.사무용품 { background: #f39c12; }
        .category-badge.회의비 { background: #1abc9c; }
        .category-badge.접대비 { background: #e67e22; }
        .category-badge.기타 { background: #95a5a6; }

        /* Receipt Images Section */
        .receipt-gallery {
            margin-top: 30px;
            page-break-before: always;
        }

        .receipt {
            page-break-inside: avoid;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 20px;
            background: #fff;
        }

        .receipt .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .receipt .receipt-header .receipt-no {
            font-size: 10pt;
            font-weight: bold;
            color: #34495e;
            background: #ecf0f1;
            padding: 3px 10px;
            border-radius: 3px;
        }

        .receipt .receipt-header .receipt-info {
            font-size: 10pt;
            color: #333;
        }

        .receipt .receipt-header .receipt-amount {
            font-size: 12pt;
            font-weight: bold;
            color: #e74c3c;
        }

        .receipt img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 700px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .receipt .missing {
            text-align: center;
            color: #e74c3c;
            font-style: italic;
            padding: 40px;
            background: #fdf2f2;
            border-radius: 4px;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #dee2e6;
            text-align: center;
            font-size: 8pt;
            color: #7f8c8d;
        }

        /* Print Optimizations */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .summary {
                page-break-inside: avoid;
            }

            table {
                page-break-inside: auto;
            }

            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }

            thead {
                display: table-header-group;
            }

            tfoot {
                display: table-footer-group;
            }
        }

        /* Total Row Styling */
        .total-row {
            background: #ecf0f1 !important;
            font-weight: bold;
        }

        .total-row td {
            border-top: 2px solid #34495e !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>{{YEAR}}년 {{MONTH}}월 경비 보고서</h1>
            <div class="subtitle">Business Expense Report</div>
        </div>

        <!-- Summary Section -->
        <div class="summary">
            <div class="summary-item">
                <div class="label">총 지출 건수</div>
                <div class="value">{{TOTAL_COUNT}}건</div>
            </div>
            <div class="summary-item">
                <div class="label">총 지출 금액</div>
                <div class="value amount">{{TOTAL_AMOUNT}}</div>
            </div>
        </div>

        <!-- Expense Details Table -->
        <div class="section-header">지출 내역</div>
        <table class="expense-table">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>날짜</th>
                    <th>가맹점</th>
                    <th>금액</th>
                    <th>사업자등록번호</th>
                    <th>분류</th>
                    <th>비고</th>
                </tr>
            </thead>
            <tbody>
                {{EXPENSE_ROWS}}
            </tbody>
        </table>

        <!-- Category Summary Table -->
        <div class="section-header">분류별 집계</div>
        <table class="category-table">
            <thead>
                <tr>
                    <th>분류</th>
                    <th>건수</th>
                    <th>금액</th>
                    <th>비율</th>
                </tr>
            </thead>
            <tbody>
                {{CATEGORY_SUMMARY}}
            </tbody>
        </table>

        <!-- Receipt Images Section -->
        <div class="receipt-gallery">
            <div class="section-header">증빙 서류 (영수증)</div>
            {{RECEIPT_IMAGES}}
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>본 보고서는 자동으로 생성되었습니다.</p>
            <p>생성일시: {{GENERATION_DATE}}</p>
        </div>
    </div>
</body>
</html>
